name: Green Contributions

on:
  schedule:
    # 8 execuções por dia no horário do Brasil
    - cron: '07 0 * * *'
      timezone: "America/Sao_Paulo"
    - cron: '38 3 * * *'
      timezone: "America/Sao_Paulo"
    - cron: '14 6 * * *'
      timezone: "America/Sao_Paulo"
    - cron: '52 9 * * *'
      timezone: "America/Sao_Paulo"
    - cron: '23 12 * * *'
      timezone: "America/Sao_Paulo"
    - cron: '47 15 * * *'
      timezone: "America/Sao_Paulo"
    - cron: '19 18 * * *'
      timezone: "America/Sao_Paulo"
    - cron: '41 21 * * *'
      timezone: "America/Sao_Paulo"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: green-contributions
  cancel-in-progress: false

jobs:
  contribution:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "anglus-software"
          git config user.email "77460329+michel-anglus@users.noreply.github.com"

      - name: Generate Heavy Activity
        id: generate
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          git pull --rebase --autostash origin "$BRANCH"

          mkdir -p .activity

          DAY=$(TZ=America/Sao_Paulo date +%u)

          if [ "$DAY" -eq 6 ] || [ "$DAY" -eq 7 ]; then
            # Sábado e domingo: 4.800 a 5.600 commits/dia
            COMMITS=$((RANDOM % 101 + 600))
          else
            # Segunda a sexta: 25 a 60 commits por execução
            COMMITS=$((RANDOM % 36 + 25))
          fi

          MESSAGES=(
            "chore: update activity"
            "chore: refresh activity"
            "chore: sync working log"
            "docs: update progress"
            "docs: add working notes"
            "fix: small adjustment"
            "refactor: cleanup activity"
            "build: update metadata"
            "ci: refresh contribution data"
            "work: update daily progress"
          )

          FILE=".activity/activity-$(TZ=America/Sao_Paulo date +%Y-%m-%d).txt"

          echo "Generating $COMMITS commits for day $DAY..."

          for ((i=1;i<=COMMITS;i++))
          do
            MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

            echo "$(TZ=America/Sao_Paulo date '+%Y-%m-%d %H:%M:%S') | $RANDOM | run $GITHUB_RUN_NUMBER | commit $i" >> "$FILE"

            git add "$FILE"
            git commit -m "$MSG" --quiet
          done

          echo "commits=$COMMITS" >> "$GITHUB_OUTPUT"
          echo "day=$DAY" >> "$GITHUB_OUTPUT"

      - name: Push Changes
        run: |
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Notify Google Chat
        if: success()
        env:
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          COMMITS: ${{ steps.generate.outputs.commits }}
          DAY: ${{ steps.generate.outputs.day }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK_URL" ]; then
            echo "GOOGLE_CHAT_WEBHOOK_URL não configurado. Pulando notificação."
            exit 0
          fi

          python3 - <<'PY' > /tmp/google-chat-message.json
          import json
          import os

          message = f"""✅ Green Contributions atualizado

          Repositório: {os.environ['REPO']}
          Branch: {os.environ['BRANCH']}
          Commits gerados: {os.environ['COMMITS']}
          Dia da semana: {os.environ['DAY']}
          Execução: #{os.environ['RUN_NUMBER']}
          Link: {os.environ['RUN_URL']}"""

          print(json.dumps({"text": message}, ensure_ascii=False))
          PY

          curl -fsS \
            -X POST \
            -H "Content-Type: application/json; charset=UTF-8" \
            --data @/tmp/google-chat-message.json \
            "$GOOGLE_CHAT_WEBHOOK_URL"
