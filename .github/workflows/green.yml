name: Green Contributions

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  contribution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate activity
        run: |
          echo "Update $(date)" >> activity.txt

      - name: Commit changes
        run: |
          git config user.name "mms1688"
          git config user.email "mms1688@users.noreply.github.com"

          git add .

          git commit -m "Automatic contribution $(date)" || exit 0

          git push
